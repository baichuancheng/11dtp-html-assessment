<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="enrol-attach.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enrol Project of De-Extinction</title>
  </head>
  <body>
    <header>
      <div><a href="/home-page/home.html">Home</a></div>
      <div>
        <a href="/about-project/about-project.html">About Project</a>
      </div>
      <div><a href="/enrol-project/enrol.html">Enrol Project</a></div>
    </header>
    <nav>
      <div class="nav-text">
        <p>Enrol Project</p>
      </div>
    </nav>
    <p class="title">
      Do your best to fill the form, then we will do our best to select you!
    </p>
    <form id="form1">
      <div class="container">
        <div class="firstname-container">
          <label for="fname">First name:</label><br />
          <input type="text" id="fname" required />
        </div>
        <div class="lastname-container">
          <label for="lname">Last name:</label><br />
          <input type="text" id="lname" required /><br />
        </div>
      </div>
      <!---->
      <div>
        <label for="email">Email:</label><br />
        <input type="email" id="email" required /><br />
      </div>
      <!---->
      <div>
        <label for="phonenumber">Phone numbr: </label><br />
        <input type="tel" id="phonenumber" placeholder="optional" /><br />
      </div>
      <!---->
      <div>
        <label for="birthdate">Birthdate:</label><br />
        <input type="date" id="birth" required /><br />
      </div>
      <!---->
      <div>
        <label for="checkbox">PhD for Biology?(optional)</label>
        <input type="checkbox" id="check" /><br />
      </div>
      <!---->
      <div>
        <label for="reason"
          >Why you want to join our De-Extinction project:</label
        ><br />
        <input type="text" id="reason" placeholder="Maximum 300 words" /><br />
      </div>
      <input type="submit" id="submit" value="Send" />
    </form>
    <p class="inform">We will contact you later if you send! Thanks!</p>
    <hr />
    <footer>
      <div class="footer-icon">
        <div><img src="/general-images/face.png" alt="" /></div>
        <div><img src="/general-images/instaa.png" alt="" /></div>
        <div><img id="twit" src="/general-images/twi.png" alt="" /></div>
      </div>
      <div class="footer-link">
        <div></div>
        <div></div>
      </div>
      <div class="contact">
        <p>Contact us</p>
        <form action="">
          <input type="email" id="email-contact" placeholder="Email" required />
          <input type="submit" id="submit-contact" value="Send" />
        </form>
      </div>
    </footer>
  </body>
</html>
